<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京ディズニーリゾート 予約URL生成ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--card:#fff;--border:#E2DDD4;
  --navy:#1B2B4B;--navy2:#2D4470;
  --gold:#B8922A;--gold-lt:#F0E0B0;
  --text:#1A1A2E;--muted:#5C5C6B;
  --ok:#2D7D46;--radius:10px;
  --shadow:0 2px 12px rgba(27,43,75,.08);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.site-header{background:linear-gradient(135deg,#121E35 0%,#1B2B4B 35%,#243760 65%,#1B2B4B 100%);color:#fff;padding:2rem 1.5rem;text-align:center;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 130%,rgba(185,146,42,.30) 0%,transparent 60%);pointer-events:none}
.site-header h1{font-family:'EB Garamond',serif;font-size:1.9rem;font-weight:600;letter-spacing:.06em;color:var(--gold-lt);position:relative}
.site-header p{font-size:.82rem;color:rgba(255,255,255,.75);margin-top:.4rem;position:relative}
.container{max-width:860px;margin:0 auto;padding:1.4rem 1rem 3rem}
.card{background:linear-gradient(180deg,#fff 0%,#FDFCF9 100%);border:1px solid;border-color:#EAE5DC #E2DDD4 #D8D2C7 #E2DDD4;border-radius:var(--radius);padding:1.4rem;box-shadow:var(--shadow);margin-bottom:1.2rem}
.card-title{font-family:'EB Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--navy);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.card-title::before{content:'';display:inline-block;width:3px;height:1.1em;background:var(--gold);border-radius:2px;flex-shrink:0}
.cond-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:520px){.cond-grid{grid-template-columns:1fr}}
.field label{display:block;font-size:.72rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem}
.field input,.field select{width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:1rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--navy)}
.hotel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
@media(max-width:520px){.hotel-grid{grid-template-columns:repeat(2,1fr)}}
.hotel-btn{padding:.65rem .4rem;border:2px solid transparent;border-radius:8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:.72rem;font-weight:500;text-align:center;transition:all .2s;background:#EDEAE3;color:#4A4A5A;line-height:1.4}
.hotel-btn .hem{display:block;font-size:1.6rem;margin-bottom:.2rem}
.hotel-btn .hcode{display:block;font-size:.62rem;opacity:.80;margin-top:.1rem}
.hotel-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.hotel-btn.active{color:#fff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.sel-acts{display:flex;gap:.5rem;margin-bottom:.85rem}
.btn-sm{padding:.28rem .7rem;font-size:.73rem;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:#fff;color:var(--muted);font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.btn-sm:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.cat-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.3rem 0;border-bottom:1px solid var(--border);margin:.8rem 0 .4rem}
.cat-title:first-child{margin-top:0}
.room-item{display:flex;align-items:center;gap:.7rem;padding:.5rem .6rem;border-radius:6px;cursor:pointer;transition:background .12s}
.room-item:hover{background:#F5F3EE}
.room-item input[type=checkbox]{width:15px;height:15px;flex-shrink:0;accent-color:var(--navy);cursor:pointer}
.room-item label{font-size:.84rem;cursor:pointer;flex:1}
.room-item .rcode{font-size:.65rem;color:var(--muted);font-family:monospace;background:#F0EEE8;padding:.1rem .28rem;border-radius:3px;white-space:nowrap;flex-shrink:0}
.null-input{font-size:.8rem;padding:.3rem .5rem;border:1px solid var(--border);border-radius:5px;font-family:'Noto Sans JP',sans-serif;width:200px;margin-left:auto;flex-shrink:0}
.cd-inner{text-align:center}
.cd-date{font-family:'EB Garamond',serif;font-size:1.55rem;color:var(--navy);margin-bottom:.25rem}
.cd-tip{font-size:.77rem;color:var(--muted);margin-bottom:1rem}
.cd-units{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;align-items:flex-end}
.cd-unit{text-align:center;min-width:55px}
.cd-val{font-family:'EB Garamond',serif;font-size:2.6rem;font-weight:600;color:var(--navy);line-height:1;display:block}
.cd-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.cd-sep{font-family:'EB Garamond',serif;font-size:2rem;color:var(--border);padding-bottom:.4rem}
.cd-unlocked{font-family:'EB Garamond',serif;font-size:1.35rem;color:var(--ok);padding:1rem}
.cd-soon .cd-val{color:#B85A00}
.gen-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;border:none;border-radius:var(--radius);font-family:'EB Garamond',serif;font-size:1.1rem;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(27,43,75,.25);margin-bottom:1.2rem}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,43,75,.32)}
.gen-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(27,43,75,.2)}
.url-result{margin-bottom:.8rem;padding:1rem;background:#F8F6F1;border:1px solid var(--border);border-radius:8px}
.url-rname{font-size:.84rem;font-weight:500;color:var(--navy);margin-bottom:.45rem}
.url-text{font-size:.72rem;color:var(--muted);font-family:monospace;word-break:break-all;margin-bottom:.55rem;background:#fff;padding:.45rem .55rem;border-radius:5px;border:1px solid var(--border)}
.url-acts{display:flex;gap:.5rem;flex-wrap:wrap}
.btn-copy,.btn-open{padding:.38rem .78rem;font-size:.78rem;border-radius:5px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;border:1.5px solid}
.btn-copy{background:#fff;border-color:var(--border);color:var(--muted)}
.btn-copy.copied,.btn-copy:hover{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-open{background:var(--navy);border-color:var(--navy);color:#fff}
.btn-open:hover{background:var(--navy2);border-color:var(--navy2)}
.msg{text-align:center;color:var(--muted);font-size:.88rem;padding:1.8rem}
.tag-battle{display:inline-block;font-size:.58rem;background:#FDE8D8;color:#B85A00;border:1px solid #F5C6A0;border-radius:3px;padding:.05rem .28rem;margin-left:.3rem;vertical-align:middle;font-weight:700}
.tag-top{display:inline-block;font-size:.58rem;background:#D8EAF8;color:#1A5276;border:1px solid #A9CCE3;border-radius:3px;padding:.05rem .28rem;margin-left:.3rem;vertical-align:middle;font-weight:700}
.cat-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}
.cat-tab{padding:.32rem .75rem;font-size:.74rem;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;background:#fff;color:var(--muted);font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:.3rem}
.cat-tab:hover{border-color:var(--navy);color:var(--navy)}
.cat-tab.active{background:var(--navy);border-color:var(--navy);color:#fff}
.cat-badge{display:inline-block;background:var(--gold-lt);color:var(--navy);border:1px solid var(--gold);border-radius:10px;font-size:.58rem;padding:.05rem .35rem;font-weight:700;line-height:1.4}
.cat-tab.active .cat-badge{background:rgba(255,255,255,.9);border-color:rgba(255,255,255,.4)}
.field input:focus-visible,.field select:focus-visible{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,43,75,.15)}
.hotel-btn:focus-visible,.cat-tab:focus-visible,.btn-sm:focus-visible,.btn-copy:focus-visible,.btn-open:focus-visible,.gen-btn:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px}
@media(max-width:520px){
  .container{padding:1rem .7rem 2.5rem}
  .card{padding:1rem .85rem}
  .site-header{padding:1.4rem 1rem}
  .site-header h1{font-size:1.55rem}
  .field input,.field select{font-size:1rem}
  .hotel-btn{padding:.6rem .3rem}
  .cat-tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:.6rem;margin-bottom:.7rem}
  .cat-tabs::-webkit-scrollbar{display:none}
  .room-item{padding:.6rem .4rem}
  .room-item input[type=checkbox]{width:18px;height:18px}
  .room-item label{font-size:.86rem}
  .room-item .rcode{display:none}
  .null-input{width:110px}
  .btn-sm{padding:.5rem .9rem;font-size:.78rem}
  .cd-date{font-size:1.25rem}
  .cd-tip{font-size:.72rem}
  .cd-units{gap:.55rem}
  .cd-unit{min-width:44px}
  .cd-val{font-size:2rem}
  .cd-sep{font-size:1.5rem}
  .url-acts{flex-direction:column}
  .btn-copy,.btn-open{width:100%;text-align:center;padding:.62rem 1rem;font-size:.85rem}
  .gen-btn{font-size:1rem}
}
/* ── お気に入り ── */
.fav-header{display:flex;align-items:center}
.fav-collapse-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.78rem;padding:.15rem .4rem;border-radius:4px;font-family:'Noto Sans JP',sans-serif;transition:background .15s}
.fav-collapse-btn:hover{background:var(--bg)}
.fav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .3rem;border-bottom:1px solid var(--border)}
.fav-item:last-child{border-bottom:none}
.fav-item:hover{background:#F5F3EE;border-radius:6px}
.fav-info{flex:1;min-width:0}
.fav-name{font-size:.86rem;font-weight:500;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-meta{font-size:.71rem;color:var(--muted);margin-top:.1rem}
.fav-acts{display:flex;gap:.4rem;flex-shrink:0}
.btn-fav-load{padding:.3rem .65rem;font-size:.73rem;border-radius:5px;cursor:pointer;background:var(--navy);color:#fff;border:none;font-family:'Noto Sans JP',sans-serif;transition:background .15s}
.btn-fav-load:hover{background:var(--navy2)}
.btn-fav-del{padding:.3rem .5rem;font-size:.73rem;border-radius:5px;cursor:pointer;background:none;color:#B03030;border:1px solid #E8C0C0;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.btn-fav-del:hover{background:#FEE;border-color:#C05050;color:#8B1A1A}
.fav-save-area{margin-bottom:1rem}
.btn-fav-save{width:100%;padding:.75rem;background:linear-gradient(135deg,#8B6914 0%,var(--gold) 100%);color:#fff;border:none;border-radius:var(--radius);font-family:'EB Garamond',serif;font-size:1.05rem;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(184,146,42,.22)}
.btn-fav-save:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(184,146,42,.35)}
.fav-save-form{background:#FDFCF9;border:1px solid var(--border);border-radius:8px;padding:.85rem;margin-top:.5rem;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.fav-name-input{flex:1;min-width:160px;padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:.9rem;color:var(--text);outline:none}
.fav-name-input:focus{border-color:var(--navy)}
.fav-name-input:focus-visible{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,43,75,.15)}
.btn-fav-confirm{padding:.5rem 1rem;background:var(--gold);color:#fff;border:none;border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:.83rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-fav-confirm:hover{background:#9A7820}
@media(max-width:520px){
  .fav-save-form{flex-direction:column;align-items:stretch}
  .fav-name-input{min-width:0}
  .btn-fav-confirm{text-align:center}
}
</style>
</head>
<body>
<header class="site-header">
  <h1>東京ディズニーリゾート<br>予約URL生成ツール</h1>
  <p>ホテル・部屋タイプを選択して公式予約サイトへのリンクを生成</p>
</header>
<div class="container">

  <div class="card" id="fav-card" style="display:none">
    <div class="card-title fav-header">お気に入り
      <button class="fav-collapse-btn" id="fav-collapse-btn" aria-expanded="true" onclick="toggleFavCollapse()">▲ 折りたたむ</button>
    </div>
    <div id="fav-list"></div>
  </div>

  <div class="card">
    <div class="card-title">検索条件</div>
    <div class="cond-grid">
      <div class="field">
        <label for="checkin-date">チェックイン日</label>
        <input type="date" id="checkin-date">
      </div>
      <div class="field">
        <label for="nights">泊数</label>
        <select id="nights">
          <option value="1">1泊</option><option value="2">2泊</option><option value="3">3泊</option>
          <option value="4">4泊</option><option value="5">5泊</option><option value="6">6泊</option>
          <option value="7">7泊</option><option value="8">8泊</option><option value="9">9泊</option>
          <option value="10">10泊</option><option value="11">11泊</option><option value="12">12泊</option>
          <option value="13">13泊</option><option value="14">14泊</option>
        </select>
      </div>
      <div class="field">
        <label for="adults">大人人数</label>
        <select id="adults">
          <option value="1">1名</option><option value="2" selected>2名</option>
          <option value="3">3名</option><option value="4">4名</option>
          <option value="5">5名</option><option value="6">6名</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">ホテル選択</div>
    <div class="hotel-grid" id="hotel-tabs"></div>
  </div>

  <div class="card">
    <div class="card-title">部屋選択</div>
    <div class="sel-acts">
      <button class="btn-sm" onclick="selectAll()">全部屋を選択</button>
      <button class="btn-sm" onclick="clearAll()">全解除</button>
    </div>
    <div id="room-list"><p class="msg">ホテルを選択してください</p></div>
  </div>

  <div class="card">
    <div class="card-title">予約解禁カウントダウン</div>
    <div class="cd-inner" id="countdown-inner">
      <p class="msg">チェックイン日を入力してください</p>
    </div>
  </div>

  <button class="gen-btn" onclick="generateUrls()">予約URLを生成する →</button>

  <div class="card" style="padding:1rem 1.4rem">
    <button class="btn-fav-save" onclick="toggleFavForm()">★ お気に入りに保存</button>
    <div class="fav-save-form" id="fav-save-form" style="display:none">
      <label for="fav-name-input" style="font-size:.75rem;color:var(--muted);display:block;margin-bottom:.3rem">お気に入り名</label>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
        <input class="fav-name-input" type="text" id="fav-name-input" placeholder="例: FSH 2026-09-27 2泊">
        <button class="btn-fav-confirm" onclick="saveFavorite(document.getElementById('fav-name-input').value)">保存する</button>
      </div>
    </div>
  </div>

  <div class="card" id="results-card" style="display:none">
    <div class="card-title">生成された予約URL</div>
    <div id="url-results"></div>
  </div>
</div>

<script>
const HOTELS = [
  {

        {n:'ファンタジーシャトー スプリングスサイド デラックス・アルコーヴルーム（パークグランドビュー）',c:'HOFSHSGA0001N'},
        {n:'ファンタジーシャトー スプリングスサイド デラックス・バルコニールーム（パークグランドビュー）',c:'HOFSHSBT0001N'},

      ]},
    ]
  },
  {
    code:'TDH', short:'ディズニー\nランドホテル', emoji:'🏯', color:'#1A5276',
    name:'東京ディズニーランドホテル',
    cats:[
      { name:'スタンダード', rooms:[
        {n:'スタンダード スーペリアルーム（３－４階）',c:'HOTDHSWN0001N'},
        {n:'スタンダード スーペリアルーム（１－９階）',c:'HOTDHSTC0001N'},
        {n:'スタンダード スーペリアルーム（パークビュー）（３－８階）',c:'HOTDHSPC0001N'},
        {n:'スタンダード スーペリアルーム（パークグランドビュー）（５－７階）',c:'HOTDHGTC0001N'},
        {n:'スタンダード スーペリアルーム（パークグランドビュー）（５－８階）',c:'HOTDHGWN0001N'},
        {n:'スタンダード スーペリアアルコーヴルーム（１－９階）',c:'HOTDHSTA0001N'},
        {n:'スタンダード スーペリアアルコーヴルーム（パークビュー）（３－８階）',c:'HOTDHSPA0001N'},
        {n:'スタンダード スーペリアアルコーヴルーム（パークグランドビュー）（５－６階）',c:'HOTDHGAM0001N'},

let selIdx = 0;
let selCatIdx = 0;
let selCodes = new Set();
let nullCodeMap = new Map();
let cdTimer = null;

function init() {
  renderTabs();
  selectHotel(0);
  const t = new Date();
  t.setMonth(t.getMonth() + 4);
  const ds = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  document.getElementById('checkin-date').value = ds;
  updateCountdown();
  document.getElementById('checkin-date').addEventListener('change', updateCountdown);
  renderFavorites();
}

function renderTabs() {
  document.getElementById('hotel-tabs').innerHTML = HOTELS.map((h,i)=>{
    const act = i===selIdx;
    const st = act ? `background:${h.color};border-color:${h.color}` : '';
    return `<button class="hotel-btn${act?' active':''}" style="${st}" onclick="selectHotel(${i})">
      <span class="hem">${h.emoji}</span>${h.short.replace('\n','<br>')}
      <span class="hcode">${h.code}</span></button>`;
  }).join('');
}

function selectHotel(i) {
  if (i !== selIdx && (selCodes.size > 0 || nullCodeMap.size > 0)) {
    if (!confirm('ホテルを変更すると部屋の選択がリセットされます。続けますか？')) return;
  }
  selIdx = i;
  selCatIdx = 0;
  selCodes = new Set();
  nullCodeMap = new Map();
  renderTabs();
  renderRooms();
}

function selectCat(i) {
  selCatIdx = i;
  renderRooms();
}

function renderRooms() {
  const h = HOTELS[selIdx];
  const cats = h.cats;
  let html = `<div class="cat-tabs">`;
  cats.forEach((cat, ci) => {
    const cnt = cat.rooms.filter(r => r.c && selCodes.has(r.c)).length;
    const badge = cnt > 0 ? `<span class="cat-badge">${cnt}</span>` : '';
    html += `<button class="cat-tab${ci===selCatIdx?' active':''}" onclick="selectCat(${ci})">${cat.name}${badge}</button>`;
  });
  html += `</div>`;
  const cat = cats[selCatIdx];
  cat.rooms.forEach((r, ri) => {
    const id = `r_${selIdx}_${selCatIdx}_${ri}`;
    const bt = r.battle ? '<span class="tag-battle">激戦</span>' : '';
    const tp = r.top ? '<span class="tag-top">最上位</span>' : '';
    const nm = r.n.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    if (r.c) {
      const chk = selCodes.has(r.c) ? ' checked' : '';
      html += `<div class="room-item">
        <input type="checkbox" id="${id}" data-code="${r.c}" data-name="${nm}"${chk} onchange="toggleRoom(this)">
        <label for="${id}">${r.n}${bt}${tp}</label>
        <span class="rcode">${r.c}</span></div>`;
    } else {
      const saved = nullCodeMap.get(id);
      const savedCode = saved ? saved.code.replace(/"/g,'&quot;') : '';
      html += `<div class="room-item">
        <input type="checkbox" id="${id}" data-code="${savedCode}" data-name="${nm}"${saved?' checked':''}>
        <label for="${id}">${r.n}${bt}${tp}</label>
        <input class="null-input" type="text" placeholder="部屋コードを入力" value="${savedCode}" oninput="onNullInput(this,'${id}')">
        </div>`;
    }
  });
  document.getElementById('room-list').innerHTML = html;
}

function onNullInput(inputEl, id) {
  const code = inputEl.value.trim();
  const cb = document.getElementById(id);
  if (cb) {
    cb.dataset.code = code;
    cb.checked = !!code;
  }
  if (code && cb) nullCodeMap.set(id, {code, name: cb.dataset.name});
  else nullCodeMap.delete(id);
}

function toggleRoom(cb) {
  if (cb.checked) selCodes.add(cb.dataset.code);
  else selCodes.delete(cb.dataset.code);
  updateCatBadges();
}

function updateCatBadges() {
  const h = HOTELS[selIdx];
  document.querySelectorAll('.cat-tab').forEach((btn, i) => {
    if (i >= h.cats.length) return;
    const cnt = h.cats[i].rooms.filter(r => r.c && selCodes.has(r.c)).length;
    const badge = btn.querySelector('.cat-badge');
    if (cnt > 0) {
      if (badge) badge.textContent = cnt;
      else btn.insertAdjacentHTML('beforeend', `<span class="cat-badge">${cnt}</span>`);
    } else {
      if (badge) badge.remove();
    }
  });
}

function selectAll() {
  const h = HOTELS[selIdx];
  h.cats.forEach(cat => cat.rooms.forEach(r => { if (r.c) selCodes.add(r.c); }));
  document.querySelectorAll('#room-list input[type=checkbox]').forEach(c => {
    if (c.dataset.code) c.checked = true;
  });
  updateCatBadges();
}
function clearAll() {
  selCodes = new Set();
  nullCodeMap = new Map();
  document.querySelectorAll('#room-list input[type=checkbox]').forEach(c => { c.checked = false; });
  document.querySelectorAll('#room-list .null-input').forEach(inp => { inp.value = ''; });
  updateCatBadges();
}

function updateCountdown() {
  const ds = document.getElementById('checkin-date').value;
  const el = document.getElementById('countdown-inner');
  if (cdTimer) { clearInterval(cdTimer); cdTimer=null; }
  if (!ds) { el.innerHTML='<p class="msg">チェックイン日を入力してください</p>'; return; }
  const [y,m,d] = ds.split('-').map(Number);
  const unlock = new Date(y, m-1-4, d, 11, 0, 0);
  const ciStr = `${y}年${m}月${d}日`;
  const dow = '日月火水木金土';
  const unlockStr = `${unlock.getFullYear()}年${unlock.getMonth()+1}月${unlock.getDate()}日（${dow[unlock.getDay()]}）11:00`;

  function tick() {
    const now = new Date();
    const diff = unlock - now;
    let h = `<div class="cd-date">解禁：${unlockStr}</div>
      <div class="cd-tip">チェックイン ${ciStr} の4ヶ月前 ／ 10:59頃からタブ待機→11:00リロードが攻略法</div>`;
    if (diff <= 0) {
      h += `<div class="cd-unlocked">✓ 予約解禁済みです！今すぐ予約できます</div>`;
    } else {
      const days = Math.floor(diff/86400000);
      const hrs  = Math.floor((diff%86400000)/3600000);
      const mins = Math.floor((diff%3600000)/60000);
      const secs = Math.floor((diff%60000)/1000);
      const sc = diff < 86400000 ? ' cd-soon' : '';
      h += `<div class="cd-units${sc}">
        <div class="cd-unit"><span class="cd-val">${days}</span><span class="cd-lbl">日</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-val">${String(hrs).padStart(2,'0')}</span><span class="cd-lbl">時間</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-val">${String(mins).padStart(2,'0')}</span><span class="cd-lbl">分</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-val">${String(secs).padStart(2,'0')}</span><span class="cd-lbl">秒</span></div>
      </div>`;
    }
    el.innerHTML = h;
  }
  tick();
  cdTimer = setInterval(tick, 1000);
}

function buildUrl(hotelCode, useDate, nights, adults, roomCode, roomName) {
  const p = new URLSearchParams({
    roomsNum:'1',adultNum:adults,stayingDays:nights,useDate,
    searchHotelCD:hotelCode,showWay:'',cpListStr:'',childNum:'0',
    childAgeBedInform:'',searchHotelDiv:'',hotelName:'',searchHotelName:'',
    searchLayer:'',hotelSearchDetail:'true',detailOpenFlg:'0',
    checkPointStr:'',hotelChangeFlg:'false',removeSessionFlg:'true',
    returnFlg:'false',hotelShowFlg:'',displayType:'data-hotel',reservationStatus:'1',
  });
  if (roomName) p.set('searchRoomName', roomName);
  if (roomCode) p.set('hotelRoomCd', roomCode);
  let url = `https://reserve.tokyodisneyresort.jp/hotel/list/?${p.toString()}`;
  if (roomCode) url += `#section_${roomCode}`;
  return url;
}

function generateUrls() {
  const ds = document.getElementById('checkin-date').value;
  if (!ds) { alert('チェックイン日を選択してください'); return; }
  const nights = document.getElementById('nights').value;
  const adults = document.getElementById('adults').value;
  const useDate = ds.replace(/-/g,'');
  const hotel = HOTELS[selIdx];
  const card = document.getElementById('results-card');
  const out  = document.getElementById('url-results');

  const allRooms = hotel.cats.flatMap(cat => cat.rooms);
  const codeEntries = allRooms.filter(r => r.c && selCodes.has(r.c))
    .map(r => ({label: r.n, code: r.c, name: r.n}));
  const nullEntries = [...nullCodeMap.values()].map(e => ({label: e.name, code: e.code, name: e.name}));
  const entries = (codeEntries.length + nullEntries.length) === 0
    ? [{label:`${hotel.name}（全部屋表示）`, code:'', name:''}]
    : [...codeEntries, ...nullEntries];

  out.innerHTML = entries.map((e,i) => {
    const url = buildUrl(hotel.code, useDate, nights, adults, e.code, e.name);
    return `<div class="url-result">
      <div class="url-rname">${escH(e.label)}</div>
      <div class="url-text">${escH(url)}</div>
      <div class="url-acts">
        <button class="btn-copy" id="cb_${i}" onclick="cpUrl(${i})">コピー</button>
        <button class="btn-open" onclick="window.open(urls[${i}],'_blank','noopener,noreferrer')">予約ページを開く →</button>
      </div></div>`;
  }).join('');

  if (entries.length === 1 && entries[0].code === '') {
    out.insertAdjacentHTML('afterbegin',
      '<p style="font-size:.8rem;color:var(--muted);margin-bottom:.8rem">※ 部屋未選択のため全部屋リスト表示URLを生成しています</p>');
  }

  window.urls = entries.map(e => buildUrl(hotel.code, useDate, nights, adults, e.code, e.name));
  card.style.display = 'block';
  setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 50);
}

function cpUrl(i) {
  navigator.clipboard.writeText(window.urls[i]).then(() => {
    const btn = document.getElementById(`cb_${i}`);
    btn.textContent = 'コピー済！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent='コピー'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    const btn = document.getElementById(`cb_${i}`);
    btn.textContent = 'コピー失敗';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  });
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── お気に入り ── */
const FAV_KEY = 'tdr_favorites';
const FAV_MAX = 30;
let favCollapsed = false;

function loadFavoritesFromStorage() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch { return []; }
}
function saveFavoritesToStorage(favs) {
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
}

function renderFavorites() {
  const favs = loadFavoritesFromStorage();
  const card = document.getElementById('fav-card');
  const list = document.getElementById('fav-list');
  if (favs.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  if (favCollapsed) { list.style.display = 'none'; return; }
  list.style.display = '';
  list.innerHTML = favs.map(f => {
    const h = HOTELS[f.hotelIdx];
    const hname = h ? `${h.emoji} ${h.code}` : '?';
    const dateStr = f.checkinDate ? f.checkinDate.replace(/-/g,'/') : '日付未設定';
    const roomCount = (f.roomCodes || []).length;
    const roomStr = roomCount === 0 ? '全部屋' : `${roomCount}部屋`;
    return `<div class="fav-item">
      <div class="fav-info">
        <div class="fav-name">★ ${escH(f.name)}</div>
        <div class="fav-meta">${escH(hname)} / ${escH(dateStr)} / ${escH(String(f.nights))}泊 / 大人${escH(String(f.adults))}名 / ${escH(roomStr)}</div>
      </div>
      <div class="fav-acts">
        <button class="btn-fav-load" onclick="loadFavorite('${escH(f.id)}')">読み込む</button>
        <button class="btn-fav-del" onclick="deleteFavorite('${escH(f.id)}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

function toggleFavCollapse() {
  favCollapsed = !favCollapsed;
  const btn = document.getElementById('fav-collapse-btn');
  btn.setAttribute('aria-expanded', String(!favCollapsed));
  btn.textContent = favCollapsed ? '▼ 展開する' : '▲ 折りたたむ';
  renderFavorites();
}

function toggleFavForm() {
  const form = document.getElementById('fav-save-form');
  const visible = form.style.display !== 'none';
  form.style.display = visible ? 'none' : '';
  if (!visible) {
    const inp = document.getElementById('fav-name-input');
    inp.value = getDefaultFavName();
    inp.focus();
  }
}

function getDefaultFavName() {
  const h = HOTELS[selIdx];
  const ds = document.getElementById('checkin-date').value || '';
  const nights = document.getElementById('nights').value;
  return `${h.code} ${ds || '日付未設定'} ${nights}泊`;
}

function saveFavorite(name) {
  const trimmed = (name || '').trim() || getDefaultFavName();
  const favs = loadFavoritesFromStorage();
  if (favs.length >= FAV_MAX) {
    const minId = favs.reduce((a, b) => Number(a.id) < Number(b.id) ? a : b).id;
    const idx = favs.findIndex(f => f.id === minId);
    if (idx !== -1) favs.splice(idx, 1);
  }
  favs.push({
    id: Date.now().toString(),
    name: trimmed,
    savedAt: new Date().toISOString(),
    hotelIdx: selIdx,
    checkinDate: document.getElementById('checkin-date').value,
    nights: Number(document.getElementById('nights').value),
    adults: Number(document.getElementById('adults').value),
    roomCodes: [...selCodes],
    nullCodes: Object.fromEntries(nullCodeMap),
  });
  saveFavoritesToStorage(favs);
  document.getElementById('fav-save-form').style.display = 'none';
  favCollapsed = false;
  document.getElementById('fav-collapse-btn').textContent = '▲ 折りたたむ';
  renderFavorites();
  document.getElementById('fav-card').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function loadFavorite(id) {
  const fav = loadFavoritesFromStorage().find(f => f.id === id);
  if (!fav) return;
  if (fav.hotelIdx >= HOTELS.length) {
    alert('このお気に入りで選択したホテルは現在利用できません');
    return;
  }
  selIdx = fav.hotelIdx;
  selCatIdx = 0;
  selCodes = new Set(fav.roomCodes || []);
  nullCodeMap = fav.nullCodes ? new Map(Object.entries(fav.nullCodes)) : new Map();
  document.getElementById('checkin-date').value = fav.checkinDate || '';
  document.getElementById('nights').value = fav.nights;
  document.getElementById('adults').value = fav.adults;
  renderTabs();
  renderRooms();
  updateCountdown();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function deleteFavorite(id) {
  const favs = loadFavoritesFromStorage().filter(f => f.id !== id);
  saveFavoritesToStorage(favs);
  renderFavorites();
}

init();
</script>
